<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}">
  {{ with resources.Get "css/style.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}">
  {{ end }}
  {{ with .OutputFormats.Get "rss" }}
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ .RelPermalink }}">
  {{ end }}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ "/" | relURL }}">{{ site.Title }}</a>
      <nav class="site-nav">
        <a href="{{ "/" | relURL }}">ダウンロード</a>
        <a href="{{ "/posts/" | relURL }}">日記</a>
        <a href="{{ "/articles/" | relURL }}">記事</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      {{ partial "social.html" . }}
      <p class="copyright">&copy; Autch</p>
    </div>
  </footer>
</body>
</html>
