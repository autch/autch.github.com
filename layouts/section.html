{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<ul class="post-list">
  {{ range .Pages }}
  <li>
    {{ if eq .Section "posts" }}
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    {{ end }}
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ else }}
  <li class="empty">まだ何もありません。</li>
  {{ end }}
</ul>
{{ end }}
